<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Masjid Al-Haq BTN CV Dewi</title>
    <link rel="stylesheet" href="desain/desain_login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <!-- Logo/Header -->
            <div class="login-header">
                <div class="mosque-icon">🕌</div>
                <h1>Masjid Al-Haq</h1>
                <p class="location">BTN CV Dewi</p>
            </div>

            <!-- Form Login -->
            <div class="login-form">
                <div class="form-group">
                    <label for="username">Username Admin</label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        placeholder="Masukkan username"
                    >
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Masukkan password"
                    >
                </div>

                <button type="button" class="btn-login" onclick="window.location.href='dashboard.html'">Masuk</button>
            </div>

            <!-- Footer -->
            <footer class="login-footer">
                <p class="info-text">Halaman Login Administrator</p>
                <p class="year">© 2026 Masjid Al-Haq BTN CV Dewi</p>
            </footer>
        </div>

        <!-- Background Pattern -->
        <div class="background-pattern"></div>
    </div>
</body>
</html>
